<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='registro.css') }}">

</head>
<body>
    <section>
        <h1>Crear cuenta nueva</h1>
        <form id="formRegistro" autocomplete="off">

            <div>
                <label for="usuarionombre">Nombre de usuario</label>
                <input type="text" id="usuarionombre" name="usuarionombre" required maxlength="50" minlength="3" placeholder="Ejemplo">
            </div>

            <div>
                <label for="apellidosusuario">Apellidos</label>
                <input type="text" id="apellidosusuario" name="apellidosusuario" required maxlength="100" minlength="5" placeholder="Apellidos Ejemplo">
            </div>

            <div>
                <label for="usuarioemail">Correo electronico</label>
                <input type="email" id="usuarioemail" name="usuarioemail" required  placeholder="ejemplo@gmail.com">
            </div>

            <div>
                <!--<label for="usuariocontraseña">Contraseña usuario</label>
                <input type="password" id="usuariocontraseña" name="usuariocontraseña" required >-->
                    <div class="password-field">
                            <label for="usuariocontraseña">Contraseña usuario</label>
                        <div class="password-wrapper">
                            <input type="password" id="usuariocontraseña" name="usuariocontraseña" required>
                            <button type="button" class="toggle-password" data-target="usuariocontraseña" aria-label="Mostrar/Ocultar Contraseña">
                                👁
                            </button>
                        </div>
                    </div>

            </div>

            <div>
                <!--<label for="confirmarcontraseña" class="label">Confirmar contraseña</label>
                <input type="password" id="confirmarcontraseña" name="confirmarcontraseña" required>-->
                <div class="password-field">
                    <label for="confirmarcontraseña">Confirmar contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmarcontraseña" name="confirmarcontraseña" required>
                        <button type="button" class="toggle-password" data-target="confirmarcontraseña" aria-label="Mostrar/Ocultar Contraseña">
                            👁
                        </button>
                    </div>
                </div>


            </div>

            <button type="submit">Registrarse</button>
        </form>
    </section>
    <script src="{{ url_for('static', filename='registroJS.js') }}"></script>

</body>
</html>
